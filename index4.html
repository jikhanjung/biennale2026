<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2026 미학비엔날레</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;height:100%;overflow:hidden;}
  /* touch-action:manipulation keeps pinch-zoom (and pan while zoomed) while we handle single-finger swipes in JS */
  body{font-family:system-ui,sans-serif;overscroll-behavior:none;touch-action:manipulation;}

  .stage{
    position:fixed;inset:0;
    width:100%;height:100%;
    overflow:hidden;
  }
  .slide{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:contain;
    opacity:0;
    transform:scale(.99);
    transition:opacity .45s ease, transform .45s ease;
    will-change:opacity,transform;
  }
  .slide.active{opacity:1;transform:scale(1);}

  /* swipe hint — finger sliding side to side, shown until the first page change */
  .hint{
    position:fixed;left:50%;bottom:34px;
    transform:translateX(-50%);
    z-index:10;
    color:#e5342a;
    pointer-events:none;
    display:flex;align-items:center;gap:8px;
    transition:opacity .45s ease;
  }
  .hint.hide{opacity:0;}
  .hint .gesture{display:flex;align-items:center;gap:8px;}

  /* prev/next buttons — always visible, work with mouse and touch */
  .nav{
    position:fixed;top:50%;transform:translateY(-50%);
    z-index:12;
    width:108px;height:108px;
    display:flex;align-items:center;justify-content:center;
    border:none;border-radius:999px;cursor:pointer;
    color:#e5342a;background:none;
    filter:drop-shadow(0 1px 4px rgba(0,0,0,.45));
    transition:color .2s ease, opacity 1.1s ease, transform .2s ease;
    -webkit-tap-highlight-color:transparent;
  }
  /* hover restores instantly; only the fade-OUT (back to .dim) stays slow */
  .nav:hover{color:#9e2018;transition:color .2s ease, opacity .15s ease, transform .2s ease;}
  .nav:active{transform:translateY(-50%) scale(.92);}
  .nav.prev{left:18px;}
  .nav.next{right:18px;}
  .nav svg{width:28px;height:28px;display:block;}
  .nav:disabled{opacity:.25;cursor:default;}
  /* fades out together with the page counter; hover restores it */
  .nav.dim{opacity:.2;}
  .nav.dim:hover{opacity:1;}
  @media(max-width:560px){
    .nav{width:90px;height:90px;}
    .nav.prev{left:10px;} .nav.next{right:10px;}
  }

  /* page counter — appears on each page change, then fades out */
  .counter{
    position:fixed;top:22px;right:24px;
    z-index:10;
    color:#e5342a;
    font-weight:700;font-size:.95rem;letter-spacing:.12em;
    font-variant-numeric:tabular-nums;
    text-shadow:0 1px 5px rgba(0,0,0,.45);
    opacity:0;
    transition:opacity 1.1s ease;
    pointer-events:none;
  }
  .counter.show{opacity:1;}
  .counter b{font-weight:700;}
  .counter .total{opacity:.55;font-weight:500;}

  /* touch: finger sliding side to side */
  .hint .chev{width:16px;height:16px;opacity:.45;}
  .hint .hand{
    width:48px;height:48px;
    filter:drop-shadow(0 2px 7px rgba(0,0,0,.4));
    animation:swipe 2.2s cubic-bezier(.45,0,.55,1) infinite;
  }
  @keyframes swipe{
    0%,100%{transform:translateX(-15px) rotate(-7deg);}
    50%{transform:translateX(15px) rotate(7deg);}
  }

  /* finger-swipe hint is only meaningful on touch devices; hide it where there's a fine pointer (mouse) */
  @media (hover:hover) and (pointer:fine){
    .hint{display:none;}
  }

  @media (prefers-reduced-motion:reduce){
    .hint .hand{animation:none;}
    .slide{transition:opacity .2s linear;}
  }
</style>
</head>
<body>

<div class="stage" id="stage"></div>

<div class="counter" id="counter" aria-hidden="true"><b class="cur">01</b> <span class="total">/ 12</span></div>

<button class="nav prev" id="prev" type="button" aria-label="이전 페이지">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 6 9 12 15 18" /></svg>
</button>
<button class="nav next" id="next" type="button" aria-label="다음 페이지">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18" /></svg>
</button>

<div class="hint" id="hint" aria-hidden="true">
  <!-- touch devices: finger swiping left/right -->
  <span class="gesture touch">
    <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 6 9 12 15 18" />
    </svg>
    <svg class="hand" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z"/>
    </svg>
    <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 6 15 12 9 18" />
    </svg>
  </span>
</div>

<script>
  const N = 12;
  const src = i => `data/KakaoTalk_20260604_080120989_${String(i).padStart(2,'0')}.png`;

  const stage = document.getElementById('stage');

  const slides = [];
  for (let i = 1; i <= N; i++) {
    const img = document.createElement('img');
    img.className = 'slide';
    img.src = src(i);
    img.alt = '';
    stage.appendChild(img);
    slides.push(img);
  }

  // page counter: appears on each page change, then fades out
  const counter = document.getElementById('counter');
  counter.querySelector('.total').textContent = '/ ' + N;
  const curEl = counter.querySelector('.cur');
  let counterTimer;
  function flashCounter() {
    curEl.textContent = String(current + 1).padStart(2, '0');
    counter.classList.add('show');
    prevBtn.classList.remove('dim');
    nextBtn.classList.remove('dim');
    clearTimeout(counterTimer);
    counterTimer = setTimeout(() => {
      counter.classList.remove('show');
      prevBtn.classList.add('dim');
      nextBtn.classList.add('dim');
    }, 1400);
  }

  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');

  let current = 0;
  function show(i) {
    const next = Math.min(N - 1, Math.max(0, i));
    if (next === current) return;
    slides[current].classList.remove('active');
    slides[next].classList.add('active');
    current = next;
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === N - 1;
    dismissHint();
    flashCounter();
  }
  function go(delta) { show(current + delta); }

  prevBtn.addEventListener('click', () => go(-1));
  nextBtn.addEventListener('click', () => go(1));

  slides[0].classList.add('active');
  prevBtn.disabled = true;
  flashCounter();

  // hide the swipe hint once the user moves a page
  const hint = document.getElementById('hint');
  let hintGone = false;
  function dismissHint() {
    if (hintGone) return;
    hintGone = true;
    hint.classList.add('hide');
    setTimeout(() => hint.remove(), 500);
  }

  // --- touch swipe: one horizontal swipe = one page (vertical swipes ignored) ---
  const THRESHOLD = 40;   // px before a swipe counts
  let sx = 0, sy = 0, tracking = false;

  const isZoomed = () => !!(window.visualViewport && window.visualViewport.scale > 1.05);

  window.addEventListener('touchstart', e => {
    // single finger only, and not while pinch-zoomed in (let the browser pan the image instead)
    if (e.touches.length !== 1 || isZoomed()) { tracking = false; return; }
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    tracking = true;
  }, { passive: true });

  window.addEventListener('touchend', e => {
    if (!tracking) return;
    tracking = false;
    if (isZoomed()) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx;
    const dy = t.clientY - sy;
    // horizontal swipes only — ignore mostly-vertical gestures for consistency
    if (Math.abs(dx) < THRESHOLD || Math.abs(dx) <= Math.abs(dy)) return;
    go(dx < 0 ? 1 : -1);   // swipe left => next page
  }, { passive: true });

  // --- desktop: wheel + keyboard, one action = one page ---
  let wheelLock = false;
  window.addEventListener('wheel', e => {
    if (e.ctrlKey) return;          // let ctrl/trackpad-pinch zoom through
    e.preventDefault();
    if (wheelLock) return;
    const d = Math.abs(e.deltaY) >= Math.abs(e.deltaX) ? e.deltaY : e.deltaX;
    if (Math.abs(d) < 8) return;
    wheelLock = true;
    setTimeout(() => { wheelLock = false; }, 500);
    go(d > 0 ? 1 : -1);
  }, { passive: false });

  window.addEventListener('keydown', e => {
    if (['ArrowDown','ArrowRight','PageDown',' '].includes(e.key)) { e.preventDefault(); go(1); }
    else if (['ArrowUp','ArrowLeft','PageUp'].includes(e.key)) { e.preventDefault(); go(-1); }
    else if (e.key === 'Home') { e.preventDefault(); show(0); }
    else if (e.key === 'End') { e.preventDefault(); show(N - 1); }
  });
</script>
</body>
</html>
